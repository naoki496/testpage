<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#140817" />
  <title>八東国語LOBBY</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="bg"></div>

  <header class="top">
    <div class="logoWrap" aria-label="八東国語LOBBY ロゴ">
      <img class="logo" id="topLogo" src="./H.K.LOBBY.png" alt="八東国語LOBBY" />
      <div class="logoFallback" id="logoFallback" hidden>
        <div class="logoFallbackTitle">八東国語LOBBY</div>
        <div class="logoFallbackSub">H.K. LOBBY</div>
      </div>
    </div>

    <!-- STATUS -->
    <section class="statusBar" aria-label="STATUS">
      <div class="statusTitle">STATUS</div>

      <!-- 2x2（スマホ） / 4列（PC） -->
      <div class="statusGrid statusGrid4">
        <!-- Rank -->
        <div class="statusItem statusItem--simple" aria-label="ランク">
          <div class="k">ランク</div>
          <div class="v" id="rankValue">-</div>
          <div class="mini">カード総数 <span class="miniNum" id="cardTotalValue">-</span></div>
        </div>

        <!-- HKP -->
        <div class="statusItem statusItem--simple" aria-label="HKP">
          <div class="k">
            HKP
            <button class="helpBtn" id="btnHkpHelp" type="button" aria-label="HKPの説明">?</button>
          </div>
          <div class="v"><span id="hkpValue">0</span></div>
          <div class="mini">Higashi Kokugo Point</div>
        </div>

        <!-- Daily50（HIGACHAの左隣） -->
        <div class="statusItem statusDaily" aria-label="FLASH DAILY 50">
          <div class="dailyHead">
            <div class="dailyTitle">FLASH DAILY 50</div>
            <div class="dailySub">合計（1日1回カウント）</div>
          </div>

          <div class="dailyRow">
            <!-- Ring -->
            <div class="ring" aria-label="進捗リング">
              <svg class="ringSvg" viewBox="0 0 44 44" aria-hidden="true">
                <circle class="ringBg" cx="22" cy="22" r="18"></circle>
                <circle class="ringProg" id="dailyRingProg" cx="22" cy="22" r="18"></circle>
              </svg>
              <div class="ringTxt">
                <div class="ringNum" id="dailySeen">0</div>
                <div class="ringDen">/50</div>
              </div>
            </div>

            <!-- Right -->
            <div class="dailyRight">
              <div class="dailyRewardLine">×5 → <b>+2HKP</b></div>

              <!-- 5段階：丸ドット（横） -->
              <div class="dailyDots" aria-label="5回で+2HKP（ドット）">
                <span class="dot" id="step1"></span>
                <span class="dot" id="step2"></span>
                <span class="dot" id="step3"></span>
                <span class="dot" id="step4"></span>
                <span class="dot" id="step5"></span>
              </div>
            </div>
          </div>

          <!-- Debug（表示維持、動作させる） -->
          <div class="dailyDbg" id="dailyDbg">
            <button class="dbgBtn" id="dbgAdd10" type="button">+10</button>
            <button class="dbgBtn" id="dbgAdd50" type="button">+50</button>
            <button class="dbgBtn" id="dbgResetDaily" type="button">RESET</button>
          </div>
        </div>

        <!-- HIGACHA -->
        <div class="statusItem" aria-label="HIGACHA">
          <button class="higachaBtn higachaBtn--tall" id="btnHigacha" type="button">
            <span class="modeIcon modeIcon--status" aria-hidden="true">
              <img src="./higacha_e.png" alt="" />
            </span>
            <span class="higachaLabel">HIGACHA</span>
          </button>
        </div>
      </div>
    </section>

    <!-- MISSIONBRIEF -->
    <section class="briefChip" aria-label="MISSION BRIEF【お知らせ】">
      <button class="briefChipBtn" id="btnBriefOpen" type="button" aria-haspopup="dialog" aria-expanded="false">
        <span class="briefChipLeft">
          <span class="briefChipTitle">MISSION BRIEF【お知らせ】</span>
          <span class="briefBadge" id="briefBadge" hidden>UPDATE</span>
        </span>
        <span class="briefChipText" id="briefOneLine">（未読）</span>
        <span class="briefChipIcon" id="briefChevron" aria-hidden="true">▼</span>
      </button>
    </section>
  </header>

  <main class="wrap" id="app">
    <!-- Tabs -->
    <nav class="modeDock" aria-label="mode switch">
      <button class="modeBtn modeFlash is-on" id="tabFlash" type="button">
        <span class="modeLeft">
          <span class="modeIcon" aria-hidden="true">
            <img src="./flashcard_e.png" alt="">
          </span>
          <span class="modeLabel modeLabel--twoLine">FLASH<br>CARD</span>
        </span>
      </button>

      <button class="modeBtn modeBlitz" id="tabBlitz" type="button">
        <span class="modeLeft">
          <span class="modeIcon" aria-hidden="true">
            <img src="./blitzquest_e.png" alt="">
          </span>
          <span class="modeLabel modeLabel--twoLine">BLITZ<br>QUEST</span>
        </span>
      </button>
    </nav>

    <!-- FLASH -->
    <section class="panel" id="panelFlash">
      <div class="grid" id="flashGrid"></div>
    </section>

    <!-- BLITZ -->
    <section class="panel" id="panelBlitz" hidden>
      <div class="archiveCard" aria-label="カード図鑑リンク">
        <div class="archiveLeft">
          <span class="modeIcon modeIcon--small" aria-hidden="true">
            <img src="./zukan_e.png" alt="">
          </span>
          <div class="archiveText">
            <div class="archiveTitle">カード図鑑</div>
            <div class="archiveSub">CARD ARCHIVE</div>
          </div>
        </div>
        <a class="archiveOpen" href="https://naoki496.github.io/cards-hub/">OPEN</a>
      </div>

      <div class="grid" id="blitzGrid"></div>
    </section>

    <footer class="footer">
      <button class="installBtn" id="btnInstall" type="button">アプリとしてインストール</button>
      <div class="installHint" id="installHint" hidden></div>
    </footer>
  </main>

  <div class="fxOverlay" id="fxOverlay" aria-hidden="true" style="display:none">
    <div class="fxPulse" aria-hidden="true"></div>
  </div>

  <!-- HKP Help Modal -->
  <div class="overlay" id="hkpHelpOverlay" style="display:none" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="HKPの説明">
      <div class="modalHead">
        <div class="modalTitle">HKP</div>
        <button class="x" id="hkpHelpClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="modalBody">
        <div class="leftPad" id="hkpHelpBody"></div>
      </div>
    </div>
  </div>

  <!-- HIGACHA Modal -->
  <div class="overlay" id="higachaOverlay" style="display:none" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="HIGACHA">
      <div class="modalHead">
        <div class="modalTitle">HIGACHA</div>
        <button class="x" id="higachaClose" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="modalBody">
        <div class="gachaHero">
          <img class="gachaImg" src="./higacha.png" alt="HIGACHA" />
        </div>

        <div class="gachaMsg leftPad" id="higachaMsg"></div>

        <div class="modalActions">
          <button class="btnPrimary" id="higachaDraw" type="button">DRAW</button>
          <button class="btnPrimary ghostBtn" id="higachaCancel" type="button">CLOSE</button>
        </div>

        <div class="note">※HIGACHAは1日1回まで</div>
      </div>
    </div>
  </div>

  <!-- MISSIONBRIEF Modal -->
  <div class="overlay" id="briefOverlay" style="display:none" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="MISSION BRIEF【お知らせ】">
      <div class="modalHead">
        <div class="modalTitle">MISSION BRIEF【お知らせ】</div>
        <button class="x" id="briefClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="modalBody">
        <ul class="briefList" id="briefList"></ul>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
