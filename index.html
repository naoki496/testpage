<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#140817" />
  <title>八東国語LOBBY</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="bg"></div>

  <main class="wrap" id="app" aria-label="八東国語LOBBY">

    <header class="hero" aria-label="ヘッダー">
      <img class="logo" src="./H.K.LOBBY.png" alt="八東国語LOBBY" onerror="this.style.display='none';document.getElementById('logoFallback').hidden=false;" />
      <div class="logoFallback" id="logoFallback" hidden>
        <div class="logoFallbackTitle">八東国語LOBBY</div>
        <div class="logoFallbackSub">H.K. LOBBY</div>
      </div>
    </header>

    <!-- STATUS -->
    <section class="statusBar" aria-label="STATUS">
      <div class="statusTitle">STATUS</div>

      <div class="statusGrid">
        <!-- Rank -->
        <div class="statusItem">
          <div class="k">ランク</div>
          <div class="v" id="rankValue">-</div>
          <div class="mini">カード総数 <span class="miniNum" id="cardTotalValue">-</span></div>
        </div>

        <!-- HKP -->
        <div class="statusItem">
          <div class="k">
            HKP
            <button class="helpBtn" id="btnHkpHelp" type="button" aria-label="HKPの説明">?</button>
          </div>
          <div class="v"><span id="hkpValue">0</span></div>
          <div class="mini">Higashi Kokugo Point</div>
        </div>

        <!-- DAILY 50 (circular gauge) -->
        <div class="statusItem statusDaily">
          <div class="k">
            <span>FLASH DAILY</span>
          </div>

          <!-- 進捗値（表示はしない：JSが更新する） -->
          <span class="srOnly" id="dailySeen">0</span>

          <div class="dailyBarMini" aria-hidden="true">
            <i id="dailyBarFill"></i>
          </div>
        </div>

        <!-- HIGACHA -->
        <div class="statusItem statusHigacha">
          <button class="higachaBtn" id="btnHigacha" type="button" aria-label="HIGACHA">
            <span class="modeIcon" aria-hidden="true">
              <img class="higachaIcon" src="./higacha.png" alt="" />
            </span>
          </button>
        </div>
      </div>
    </section>

    <!-- MISSIONBRIEF -->
    <section 
      class="mission"
      aria-label="MISSION BRIEF"
    >
      <button class="missionBtn" id="btnMission" type="button">
        <span class="missionLeft">
          <span class="missionTitle">MISSION BRIEF〖お知らせ〗</span>
          <span class="missionBadge" id="missionBadge" aria-live="polite">UPDATE</span>
          <span class="missionUnread" id="missionUnread" aria-live="polite">（未読）</span>
        </span>
        <span class="missionRight" aria-hidden="true">▼</span>
      </button>
      <div class="missionBody" id="missionBody" hidden></div>
    </section>

    <!-- modes -->
    <section class="modes" aria-label="モード選択">
      <a class="modeBtn modeFlash" href="https://naoki496.github.io/kobun-quiz/" aria-label="FLASH CARD">
        <span class="modeIcon" aria-hidden="true">
          <img src="./flash.png" alt="" />
        </span>
        <span class="modeName">FLASH CARD</span>
      </a>

      <a class="modeBtn modeBlitz" href="https://naoki496.github.io/blitz-quest/" aria-label="BLITZ QUEST">
        <span class="modeIcon" aria-hidden="true">
          <img src="./blitz.png" alt="" />
        </span>
        <span class="modeName">BLITZ QUEST</span>
      </a>
    </section>

    <!-- card hub -->
    <section class="hub" aria-label="カード図鑑">
      <a class="hubBtn" href="https://naoki496.github.io/cards-hub/" aria-label="カード図鑑">
        <span class="hubIcon" aria-hidden="true">
          <img src="./archive.png" alt="" />
        </span>
        <span class="hubText">
          <span class="hubTitle">カード図鑑</span>
          <span class="hubSub">CARD ARCHIVE</span>
        </span>
        <span class="hubOpen" aria-hidden="true">OPEN</span>
      </a>
    </section>

    <!-- install -->
    <section class="install" aria-label="インストール">
      <button class="installBtn" id="btnInstall" type="button" hidden>アプリとしてインストール</button>
    </section>

    <!-- bottom quick -->
    <nav class="bottomBar" aria-label="クイック">
      <button class="bottomBtn" id="btnHkp" type="button" aria-label="HKP">
        <span class="bottomLabel">HKP</span>
        <span class="bottomX" aria-hidden="true">×</span>
      </button>

      <button class="bottomBtn" id="btnDaily" type="button" aria-label="FLASH DAILY 50">
        <span class="bottomLabel">FLASH DAILY 50</span>
        <span class="bottomX" aria-hidden="true">×</span>
      </button>

      <button class="bottomBtn" id="btnHigachaOpen" type="button" aria-label="HIGACHA">
        <span class="bottomLabel">HIGACHA</span>
        <span class="bottomX" aria-hidden="true">×</span>
      </button>

      <button class="bottomBtn bottomIconOnly" id="btnHigacha" type="button" aria-label="HIGACHA">
        <img class="bottomIcon" src="./higacha.png" alt="" />
      </button>

      <button class="bottomBtn" id="btnHigachaClose" type="button" aria-label="DRAW CLOSE">
        <span class="bottomLabel">DRAW CLOSE</span>
        <span class="bottomX" aria-hidden="true">×</span>
      </button>

      <div class="bottomNote" id="bottomNote">※HIGACHAは1日1回まで</div>
    </nav>

  </main>

  <!-- HKP Help -->
  <div class="overlay" id="hkpHelpOverlay" style="display:none" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="HKPの説明">
      <div class="modalHead">
        <div class="modalTitle">HKP</div>
        <button class="x" id="hkpHelpClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="modalBody">
        <div class="leftPad" id="hkpHelpBody"></div>
      </div>
    </div>
  </div>

  <!-- Daily50 Help -->
  <div class="overlay" id="dailyHelpOverlay" style="display:none" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="FLASH DAILY 50の説明">
      <div class="modalHead">
        <div class="modalTitle">FLASH DAILY 50</div>
        <button class="x" id="dailyHelpClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="modalBody">
        <div class="leftPad" id="dailyHelpBody"></div>
      </div>
    </div>
  </div>

  <!-- HIGACHA Modal -->
  <div class="overlay" id="higachaOverlay" style="display:none" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="HIGACHA">
      <div class="modalHead">
        <div class="modalTitle">HIGACHA</div>
        <button class="x" id="higachaClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="modalBody">
        <div class="leftPad">
          <p>DRAWを押すと、本日のガチャが実行されます。</p>
          <button class="cta" id="btnDraw" type="button">DRAW</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
