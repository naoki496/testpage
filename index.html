<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#140817" />
  <title>八東国語LOBBY</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg"></div>
  <header class="top">
    <div class="logoWrap">
      <img class="logo" src="./H.K.LOBBY.png" alt="八東国語LOBBY" />
    </div>

    <section class="statusBar">
      <div class="statusTitle">STATUS</div>
      <div class="statusGrid">
        <div class="statusItem">
          <div class="k">ランク</div>
          <div class="v" id="rankValue">-</div>
          <div class="mini">カード総数 <span class="miniNum" id="cardTotalValue">-</span></div>
        </div>

        <div class="statusItem">
          <div class="k">
            HKP
            <button class="helpBtn" id="btnHkpHelp" type="button">?</button>
          </div>
          <div class="v"><span id="hkpValue">0</span></div>
        </div>

        <div class="statusItem">
          <div class="k">
            DAILY 50
            <button class="helpBtn" id="btnDailyHelp" type="button">?</button>
          </div>
          <div class="v"><span id="dailySeen">0</span>/50</div>
        </div>

        <div class="statusItem">
          <button class="higachaBtn" id="btnHigacha" type="button">
            <img class="higachaIcon" src="./higacha_e.png" alt="" />
            <span>HIGACHA</span>
          </button>
        </div>
      </div>
    </section>

    <section class="briefChip">
      <button class="briefChipBtn" id="btnBriefOpen" type="button">
        <span class="briefChipLeft">
          <span class="briefChipTitle">MISSION BRIEF【お知らせ】</span>
          <span class="briefBadge" id="briefBadge" hidden>UPDATE</span>
        </span>
        <span class="briefChipText" id="briefOneLine">（未読）</span>
        <span class="briefChipIcon">▼</span>
      </button>
    </section>
  </header>

  <main class="wrap" id="app">
    <nav class="modeDock">
      <button class="modeBtn modeFlash is-on" id="tabFlash">
        <span class="modeLeft">
          <span class="modeIcon"><img src="./flashcard_e.png" alt=""></span>
          <span class="modeLabel">FLASH<br>CARD</span>
        </span>
      </button>
      <button class="modeBtn modeBlitz" id="tabBlitz">
        <span class="modeLeft">
          <span class="modeIcon"><img src="./blitzquest_e.png" alt=""></span>
          <span class="modeLabel">BLITZ<br>QUEST</span>
        </span>
      </button>
    </nav>

    <section class="panel" id="panelFlash">
      <div class="grid" id="flashGrid"></div>
    </section>

    <section class="panel" id="panelBlitz" hidden>
      <div class="archiveCard">
        <div class="archiveLeft">
          <img class="miniIcon" src="./zukan_e.png" alt="">
          <div class="archiveText">
            <div class="archiveTitle">カード図鑑</div>
            <div class="archiveSub">CARD ARCHIVE</div>
          </div>
        </div>
        <a class="archiveOpen" href="https://naoki496.github.io/cards-hub/">OPEN</a>
      </div>
      <div class="grid" id="blitzGrid"></div>
    </section>

    <footer class="footer">
      <button class="installBtn" id="btnInstall">アプリとしてインストール</button>
      <div class="installHint" id="installHint" hidden></div>
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
