<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#140817" />
  <title>八東国語LOBBY</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="bg"></div>

  <header class="top">
    <!-- TOP LOGO -->
    <div class="logoWrap">
      <img class="logo" id="topLogo" src="./H.K.LOBBY.png" alt="八東国語LOBBY" />
      <div class="logoFallback" id="logoFallback" hidden>
        <div class="logoFallbackTitle">八東国語LOBBY</div>
        <div class="logoFallbackSub">H.K. LOBBY</div>
      </div>
    </div>

    <!-- STATUS -->
    <section class="statusBar">
      <div class="statusTitle">STATUS</div>
      <div class="statusGrid">
        <div class="statusItem">
          <div class="k">ランク</div>
          <div class="v" id="rankValue">-</div>
          <div class="mini">カード総数 <span id="cardTotalValue">-</span></div>
        </div>

        <div class="statusItem">
          <div class="k">
            HKP
            <button class="helpBtn" id="btnHkpHelp">?</button>
          </div>
          <div class="v" id="hkpValue">0</div>
        </div>

        <div class="statusItem">
          <div class="k">HIGACHA</div>
          <button class="higachaBtn" id="btnHigacha">
            <span class="dot"></span>OPEN
          </button>
        </div>
      </div>
    </section>

    <!-- MISSIONBRIEF -->
    <section class="briefChip">
      <button class="briefChipBtn" id="btnBriefOpen">
        <span class="briefChipTitle">MISSIONBRIEF</span>
        <span class="briefChipText" id="briefOneLine">（未読）</span>
        <span class="briefChipIcon">▸</span>
      </button>
    </section>
  </header>

  <main class="wrap">
    <!-- MODE SELECT -->
    <nav class="modeDock">
      <button class="modeBtn modeFlash is-on" id="tabFlash">
        <span class="modeLabel">FLASHCARD</span>
        <span class="modeTag">DRILL</span>
      </button>
      <button class="modeBtn modeBlitz" id="tabBlitz">
        <span class="modeLabel">BLITZQUEST</span>
        <span class="modeTag">BATTLE</span>
      </button>
    </nav>

    <!-- FLASH -->
    <section class="panel" id="panelFlash">
      <div class="grid" id="flashGrid"></div>
    </section>

    <!-- BLITZ -->
    <section class="panel" id="panelBlitz" hidden>
      <div class="archiveCard">
        <div>
          <div class="archiveTitle">カード図鑑</div>
          <div class="archiveSub">CARD ARCHIVE</div>
        </div>
        <a class="aBtn ghost" href="https://naoki496.github.io/cards-hub/">OPEN</a>
      </div>
      <div class="grid" id="blitzGrid"></div>
    </section>

    <!-- INSTALL -->
    <footer class="footer">
      <button class="installBtn" id="btnInstall">アプリとしてインストール</button>
      <div class="installHint" id="installHint" hidden></div>
    </footer>
  </main>

  <!-- Modals -->
  <div class="overlay" id="briefOverlay" style="display:none">
    <div class="modal">
      <div class="modalHead">
        <div class="modalTitle">MISSIONBRIEF</div>
        <button class="x" id="briefClose">×</button>
      </div>
      <div class="modalBody">
        <ul class="briefList" id="briefList"></ul>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
