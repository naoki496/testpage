<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#140817" />
  <title>八東国語LOBBY</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="bg"></div>

  <header class="top">
    <div class="logoWrap" aria-label="八東国語LOBBY ロゴ">
      <img class="logo" id="topLogo" src="./H.K.LOBBY.png" alt="八東国語LOBBY" />
      <div class="logoFallback" id="logoFallback" hidden>
        <div class="logoFallbackTitle">八東国語LOBBY</div>
        <div class="logoFallbackSub">H.K. LOBBY</div>
      </div>
    </div>

    <!-- STATUS -->
    <section class="statusBar" aria-label="STATUS">
      <div class="statusTitle">STATUS</div>

      <div class="statusGrid">
        <div class="statusItem">
          <div class="k">ランク</div>
          <div class="v" id="rankValue">-</div>
          <div class="mini">カード総数 <span class="miniNum" id="cardTotalValue">-</span></div>
        </div>

        <div class="statusItem">
          <div class="k">
            HKP
            <button class="helpBtn" id="btnHkpHelp" type="button" aria-label="HKPの説明">?</button>
          </div>
          <div class="v"><span id="hkpValue">0</span></div>
        </div>

        <!-- HIGACHA -->
        <div class="statusItem">
          <div class="k"></div>
          <button class="higachaBtn" id="btnHigacha" type="button">
            <span class="modeIcon" aria-hidden="true">
              <img src="./higacha_e.png" alt="">
            </span>
            <span>HIGACHA</span>
          </button>
        </div>
      </div>
    </section>

    <!-- MISSIONBRIEF -->
    <section class="briefChip" aria-label="MISSIONBRIEF">
      <button class="briefChipBtn" id="btnBriefOpen" type="button" aria-haspopup="dialog">
        <span class="briefChipLeft">
          <span class="briefChipTitle">MISSIONBRIEF</span>
          <span class="briefBadge" id="briefBadge" hidden>UPDATE</span>
        </span>
        <span class="briefChipText" id="briefOneLine">（未読）</span>
        <span class="briefChipIcon" aria-hidden="true">▸</span>
      </button>
    </section>
  </header>

  <main class="wrap" id="app">
    <!-- Tabs -->
    <nav class="modeDock" aria-label="mode switch">
      <button class="modeBtn modeFlash is-on" id="tabFlash" type="button">
        <span class="modeLeft">
          <span class="modeIcon" aria-hidden="true">
            <img src="./flashcard_e.png" alt="">
          </span>
          <span class="modeLabel modeLabelBreak">FLASH<wbr>CARD</span>
        </span>
      </button>

      <button class="modeBtn modeBlitz" id="tabBlitz" type="button">
        <span class="modeLeft">
          <span class="modeIcon" aria-hidden="true">
            <img src="./blitzquest_e.png" alt="">
          </span>
          <span class="modeLabel modeLabelBreak">BLITZ<wbr>QUEST</span>
        </span>
      </button>
    </nav>

    <!-- FLASH -->
    <section class="panel" id="panelFlash">
      <div class="grid" id="flashGrid"></div>

      <div class="dailyCard" aria-label="FLASHCARD DAILY 50">
        <div class="dailyTop">
          <div class="dailyTitle">FLASH DAILY 50</div>
          <div class="dailySub"><span id="dailySeen">0</span> / 50（合計）</div>
        </div>

        <div class="dailyBar" aria-hidden="true">
          <i id="dailyBarFill" style="width:0%"></i>
        </div>

        <div class="dailySteps" aria-label="ゲージ（5回で+2HKP）">
          <span class="step" id="step1"></span>
          <span class="step" id="step2"></span>
          <span class="step" id="step3"></span>
          <span class="step" id="step4"></span>
          <span class="step" id="step5"></span>
          <span class="dailyReward">×5 → +2HKP</span>
        </div>

        <div class="dailyDbg" id="dailyDbg" hidden>
          <button class="dbgBtn" id="dbgAdd10" type="button">+10</button>
          <button class="dbgBtn" id="dbgAdd50" type="button">+50</button>
          <button class="dbgBtn" id="dbgResetDaily" type="button">RESET</button>
        </div>
      </div>
    </section>

    <!-- BLITZ -->
    <section class="panel" id="panelBlitz" hidden>
      <div class="archiveCard" aria-label="カード図鑑リンク">
        <div class="archiveLeft">
          <img class="miniIcon" src="./zukan_e.png" alt="" aria-hidden="true">
          <div class="archiveText">
            <div class="archiveTitle">カード図鑑</div>
            <div class="archiveSub">CARD ARCHIVE</div>
          </div>
        </div>

        <a class="archiveOpen" href="https://naoki496.github.io/cards-hub/">OPEN</a>
      </div>

      <div class="grid" id="blitzGrid"></div>
    </section>

    <footer class="footer">
      <button class="installBtn" id="btnInstall" type="button">アプリとしてインストール</button>
      <div class="installHint" id="installHint" hidden></div>
    </footer>
  </main>

  <div class="fxOverlay" id="fxOverlay" aria-hidden="true" style="display:none">
    <div class="fxPulse" aria-hidden="true"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
