<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#140817" />
  <title>八東国語LOBBY</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="bg"></div>

  <header class="top">
    <div class="logoWrap" aria-label="八東国語LOBBY ロゴ">
      <img class="logo" id="topLogo" src="./H.K.LOBBY.png" alt="八東国語LOBBY" />
    </div>

    <!-- STATUS -->
    <section class="statusBar" aria-label="STATUS">
      <div class="statusTitle">STATUS</div>

      <div class="statusGrid">
        <!-- Rank -->
        <div class="statusItem">
          <div class="k">ランク</div>
          <div class="v" id="rankValue">-</div>
          <div class="mini">カード総数 <span class="miniNum" id="cardTotalValue">-</span></div>
        </div>

        <!-- HKP -->
        <div class="statusItem">
          <div class="k">
            HKP
            <button class="helpBtn" id="btnHkpHelp" type="button" aria-label="HKPの説明">?</button>
          </div>
          <div class="v"><span id="hkpValue">0</span></div>
        </div>

        <!-- DAILY -->
        <div class="statusItem statusDaily">
          <div class="k">
            DAILY
            <button class="helpBtn" id="btnDailyHelp" type="button" aria-label="DAILYの説明">?</button>
          </div>

          <div class="ringRow">
            <div class="ringBox">
              <svg class="ring" viewBox="0 0 48 48">
                <circle class="ringTrack" cx="24" cy="24" r="22"></circle>
                <circle class="ringProg" id="dailyRingProg" cx="24" cy="24" r="22"></circle>
              </svg>
              <div class="ringCenter">
                <div class="ringNum" id="dailySeen">0</div>
                <div class="ringDen">/50</div>
              </div>
            </div>
            <div class="ringText">
              <div class="ringHint">FLASHCARD 合算</div>
            </div>
          </div>
        </div>

        <!-- HIGACHA -->
        <div class="statusItem">
          <button class="higachaBtn" id="btnHigacha" type="button">
            <span class="modeIcon" aria-hidden="true">
              <img src="./higacha_e.png" alt="">
            </span>
            <span>HIGACHA</span>
          </button>
        </div>
      </div>
    </section>

    <!-- MISSION BRIEF -->
    <section class="briefChip" aria-label="MISSION BRIEF">
      <button class="briefChipBtn" id="btnBriefOpen" type="button" aria-haspopup="dialog">
        <span class="briefChipLeft">
          <span class="briefChipTitle">MISSION BRIEF【お知らせ】</span>
          <span class="briefBadge" id="briefBadge" hidden>UPDATE</span>
        </span>
        <span class="briefChipText" id="briefOneLine">（未読）</span>
        <span class="briefChipIcon" aria-hidden="true">▼</span>
      </button>
    </section>
  </header>

  <main class="wrap" id="app">
    <!-- existing content untouched -->
  </main>

  <!-- HKP Help Modal -->
  <div class="overlay" id="hkpHelpOverlay" style="display:none" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="HKPの説明">
      <div class="modalHead">
        <div class="modalTitle">HKP</div>
        <button class="x" id="hkpHelpClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="modalBody">
        <div class="leftPad" id="hkpHelpBody"></div>
      </div>
    </div>
  </div>

  <!-- DAILY Help Modal -->
  <div class="overlay" id="dailyHelpOverlay" style="display:none" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="DAILYの説明">
      <div class="modalHead">
        <div class="modalTitle">DAILY 50</div>
        <button class="x" id="dailyHelpClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="modalBody">
        <div class="leftPad">
FLASHCARD 系コンテンツを
1日合計 50 枚確認すると
ゲージが進行します。

※ 進行は1日1回まで
※ 連続日数は別途管理されます
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
