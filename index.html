<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#140817" />
  <title>八東国語LOBBY</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
<div class="bg"></div>

<header class="top">
  <!-- TOP IMAGE -->
  <div class="logoWrap">
    <img class="logo" src="./H.K.LOBBY.png" alt="八東国語LOBBY">
  </div>

  <!-- STATUS -->
  <section class="statusBar">
    <div class="statusTitle">STATUS</div>
    <div class="statusGrid">

      <div class="statusItem">
        <div class="k">ランク</div>
        <div class="v">-</div>
        <div class="mini">カード総数 -</div>
      </div>

      <div class="statusItem">
        <div class="k">
          HKP
          <button class="helpBtn" id="btnHkpHelp">?</button>
        </div>
        <div class="v" id="hkpValue">0</div>
      </div>

      <div class="statusItem">
        <div class="k">HIGACHA</div>
        <button class="higachaBtn" id="btnHigacha">
          <img src="./higacha_e.png" alt="" class="miniIcon">
          OPEN
        </button>
      </div>

    </div>
  </section>

  <!-- MISSIONBRIEF -->
  <section class="briefChip">
    <button class="briefChipBtn" id="btnBriefOpen">
      <span class="briefChipTitle">MISSIONBRIEF</span>
      <span class="briefBadge is-new">NEW</span>
      <span class="briefChipText" id="briefOneLine">（未読）</span>
    </button>
  </section>
</header>

<main class="wrap">

  <!-- MODE -->
  <nav class="modeDock">
    <button class="modeBtn modeFlash is-on" id="tabFlash">
      <span class="modeLeft">
        <span class="modeIcon"><img src="./flashcard_e.png" alt=""></span>
        <span class="modeLabel">FLASHCARD</span>
      </span>
      <span class="modeTag">DRILL</span>
    </button>

    <button class="modeBtn modeBlitz" id="tabBlitz">
      <span class="modeLeft">
        <span class="modeIcon"><img src="./blitzquest_e.png" alt=""></span>
        <span class="modeLabel">BLITZQUEST</span>
      </span>
      <span class="modeTag">BATTLE</span>
    </button>
  </nav>

  <!-- FLASH -->
  <section class="panel" id="panelFlash">
    <div class="grid">
      <a class="aBtn primary hasGauge" href="https://naoki496.github.io/flashcards/">
        古文単語
        <span class="gauge"><i style="width:0%"></i></span>
      </a>
      <a class="aBtn primary hasGauge" href="https://naoki496.github.io/hatto-kobun-jodoushi/">
        助動詞
        <span class="gauge"><i style="width:0%"></i></span>
      </a>
      <a class="aBtn primary hasGauge" href="https://naoki496.github.io/bungaku/">
        文学知識総合
        <span class="gauge"><i style="width:0%"></i></span>
      </a>
    </div>
  </section>

  <!-- BLITZ -->
  <section class="panel" id="panelBlitz" hidden>

    <div class="archiveCard">
      <div class="archiveLeft">
        <img src="./zukan_e.png" alt="" class="miniIcon">
        <div>
          <div class="archiveTitle">カード図鑑</div>
          <div class="archiveSub">CARD ARCHIVE</div>
        </div>
      </div>
      <a class="aBtn ghost" href="https://naoki496.github.io/cards-hub/">OPEN</a>
    </div>

    <div class="grid">
      <div class="card">
        <div class="cardTitle">古文単語330マスター</div>
        <div class="cardActions">
          <a class="aBtn primary" href="https://naoki496.github.io/kobun-quiz/">NORMAL</a>
          <a class="aBtn danger expertBtn" href="https://naoki496.github.io/kobun-quiz/expert.html">EXPERT</a>
        </div>
      </div>
    </div>

  </section>

  <footer class="footer">
    <button class="installBtn" id="btnInstall">アプリとしてインストール</button>
  </footer>

</main>

<script src="./app.js"></script>
</body>
</html>
