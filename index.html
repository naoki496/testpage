<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>八東国語LOBBY</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="top">
    <section class="statusBar">
      <div class="statusTitle">STATUS</div>
      <div class="statusGrid">
        <div class="statusItem">
          <div class="k">ランク</div>
          <div class="v" id="rankValue">-</div>
          <div class="mini">カード総数 <span id="cardTotalValue">-</span></div>
        </div>

        <div class="statusItem">
          <div class="k">HKP <button class="helpBtn" id="btnHkpHelp">?</button></div>
          <div class="v"><span id="hkpValue">0</span></div>
          <div class="mini">Higashi Kokugo Point</div>
        </div>

        <div class="statusItem">
          <div class="k">FLASH DAILY 50 <button class="helpBtn" id="btnDailyHelp">?</button></div>
          <svg class="ring" viewBox="0 0 52 52">
            <circle class="ringTrack" cx="26" cy="26" r="22"/>
            <circle class="ringProg" id="dailyRingProg" cx="26" cy="26" r="22"/>
          </svg>
          <div class="mini"><span id="dailySeen">0</span> / 50</div>
        </div>

        <div class="statusItem">
          <button class="higachaBtn" id="btnHigacha">HIGACHA</button>
        </div>
      </div>
    </section>
  </header>

  <!-- HKP Modal -->
  <div class="overlay" id="hkpModal">
    <div class="modal">
      <h2>HKPとは</h2>
      <p>学習で獲得できるポイントです。HIGACHAでも入手できます。</p>
      <button class="close" data-close>閉じる</button>
    </div>
  </div>

  <!-- DAILY Modal -->
  <div class="overlay" id="dailyModal">
    <div class="modal">
      <h2>FLASH DAILY 50</h2>
      <p>FLASHCARDで本日50枚学習すると進行します。5回で+2HKP。</p>
      <button class="close" data-close>閉じる</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
